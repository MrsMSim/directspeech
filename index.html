<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Bubble Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF7F0;
    --ink:#2E2A26;
    --ink-soft:#6b6357;
    --tag:#3468A0;
    --tag-chip:#E1EBF7;
    --punct:#B23A6B;
    --punct-chip:#F7E3EC;
    --mark:#C97A2E;
    --mark-chip:#FBEBDA;
    --cap:#3E8F72;
    --cap-chip:#E3F2EA;
    --card-bg:#FFFFFF;
    --shadow: 0 3px 0 rgba(46,42,38,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Lexend', sans-serif;
    min-height:100vh;
    padding:20px 16px 60px;
  }
  .wrap{max-width:820px;margin:0 auto;}
  header{text-align:center;margin-bottom:18px;}
  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(26px,5vw,38px);
    margin:0 0 4px;
  }
  .subtitle{color:var(--ink-soft);font-size:16px;margin:0;}

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    align-items:center;
    margin:18px 0 20px;
  }
  .control-group{
    display:flex;
    background:var(--card-bg);
    border-radius:999px;
    padding:4px;
    box-shadow:var(--shadow);
    gap:2px;
  }
  .control-group button{
    border:none;background:transparent;
    font-family:'Lexend',sans-serif;font-weight:600;font-size:14px;
    padding:9px 16px;border-radius:999px;cursor:pointer;color:var(--ink-soft);
  }
  .control-group button.active{background:var(--ink);color:#fff;}
  .control-group button:focus-visible{outline:3px solid var(--tag);outline-offset:2px;}

  .card{
    background:var(--card-bg);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:28px 24px;
    margin-bottom:18px;
  }

  .sentence-display{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(20px,4vw,28px);
    line-height:1.9;
    text-align:center;
  }
  .seg-text{color:var(--ink);}
  .blank{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:34px;
    height:38px;
    padding:0 6px;
    border-radius:8px;
    border:3px dashed #d8d0c0;
    margin:0 2px;
    vertical-align:middle;
    color:#c9c2b4;
    font-size:22px;
  }
  .blank.filled{border-style:solid;color:#fff;}
  .blank.kind-comma.filled,.blank.kind-period.filled{background:var(--mark);border-color:var(--mark);}
  .blank.kind-open.filled,.blank.kind-close.filled{background:var(--punct);border-color:var(--punct);}
  .blank.kind-cap.filled{background:var(--cap);border-color:var(--cap);}
  .letter-blank{min-width:28px;padding:0 4px;font-family:'Baloo 2',sans-serif;}
  .blank.kind-endmark.filled,.blank.kind-innermark.filled{background:var(--mark);border-color:var(--mark);}
  .blank.active{border-color:var(--ink);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  @keyframes shake{
    10%,90%{transform:translateX(-2px);}
    20%,80%{transform:translateX(3px);}
    30%,50%,70%{transform:translateX(-5px);}
    40%,60%{transform:translateX(5px);}
  }
  .shake{animation:shake 0.5s;}

  .status-row{
    text-align:center;
    margin-top:16px;
    min-height:28px;
    font-weight:600;
    color:var(--cap);
    font-size:15px;
  }

  .palette{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:14px;
  }
  .palette-btn{
    border:none;
    background:var(--card-bg);
    box-shadow:var(--shadow);
    border-radius:14px;
    padding:12px 18px;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    color:var(--ink);
    min-width:56px;
    font-family:'Baloo 2',sans-serif;
  }
  .palette-btn:focus-visible{outline:3px solid var(--tag);outline-offset:2px;}
  .palette-btn.cap-btn{font-size:16px;}

  .action-row{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:8px;
  }
  .say-btn, .next-btn, .hint-btn{
    border:none;
    font-family:'Lexend',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:10px 20px;
    border-radius:999px;
    cursor:pointer;
  }
  .say-btn{background:var(--ink);color:#fff;}
  .say-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .next-btn{background:var(--tag);color:#fff;}
  .hint-btn{background:transparent;border:2px solid var(--ink-soft);color:var(--ink-soft);}
  .say-btn:focus-visible,.next-btn:focus-visible,.hint-btn:focus-visible{outline:3px solid var(--tag);outline-offset:2px;}

  .hint-box{
    background:var(--tag-chip);
    color:var(--tag);
    border-radius:12px;
    padding:12px 16px;
    font-size:14px;
    text-align:center;
    margin-top:14px;
    display:none;
  }
  .hint-box.show{display:block;}

  .streak{text-align:center;color:var(--ink-soft);font-size:14px;margin-top:16px;}
  .streak b{color:var(--ink);}

  .legend{
    display:flex;flex-wrap:wrap;justify-content:center;gap:14px;
    font-size:12px;color:var(--ink-soft);margin-top:18px;
  }
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .swatch{width:12px;height:12px;border-radius:4px;display:inline-block;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🗨️ Speech Bubble Builder</h1>
    <p class="subtitle">Tap the right mark for each gap — no typing needed.</p>
  </header>

  <div class="controls">
    <div class="control-group" role="group" aria-label="Choose pattern">
      <button data-pattern="tagFirst" class="active">Tag First</button>
      <button data-pattern="tagLast">Tag Last</button>
    </div>
    <div class="control-group" role="group" aria-label="Choose sentence type">
      <button data-type="statement" class="active">Statement</button>
      <button data-type="question">Question</button>
      <button data-type="exclamation">Exclamation</button>
    </div>
  </div>

  <div class="card">
    <div class="sentence-display" id="sentenceDisplay"></div>
    <div class="status-row" id="statusRow"></div>
  </div>

  <div class="palette" id="palette"></div>

  <div class="action-row">
    <button class="say-btn" id="sayBtn" disabled>🔊 Say it</button>
    <button class="hint-btn" id="hintBtn">💡 Hint</button>
    <button class="next-btn" id="nextBtn">🔀 New line</button>
  </div>
  <div class="hint-box" id="hintBox"></div>

  <p class="streak">Sentences punctuated correctly: <b id="streakCount">0</b></p>

  <div class="legend">
    <span><span class="swatch" style="background:var(--punct)"></span>quotation marks</span>
    <span><span class="swatch" style="background:var(--cap)"></span>capital letter</span>
    <span><span class="swatch" style="background:var(--mark)"></span>end punctuation</span>
  </div>
</div>

<script>
const SPEAKERS = [
  {first:'Tom', last:'Tom'},
  {first:'Mei', last:'Mei'},
  {first:'The boy', last:'the boy'},
  {first:'The girl', last:'the girl'},
  {first:'The teacher', last:'the teacher'},
  {first:'Grandma', last:'Grandma'}
];

const LINES = {
  statement: ['the cake is ready','my kite is broken','the bus is late','this soup is tasty'],
  question: ['where is my bag','can we go now','what is that noise','is this seat free'],
  exclamation: ['we won the race','look at the rainbow','that is amazing','the kitten can jump']
};

const VERBS = {
  statement: ['said','replied','explained','whispered','added','lamented','mentioned','remarked'],
  question: ['asked','wondered','suggested','inquired'],
  exclamation: ['shouted','exclaimed','cried','chirped','gasped','declared']
};

const HINTS = {
  comma: "A comma comes right after the speaker, before the quote opens.",
  open: "Show that talking is starting.",
  cap: "The first word of what someone says always starts with a capital letter.",
  close: "Show that the talking has stopped.",
  endmark: {
    statement: "Finish it the way a normal sentence ends.",
    question: "This is a question — finish it the way a question ends.",
    exclamation: "This shows strong feeling — finish it the way an exclamation ends."
  },
  innermark: {
    statement: "The sentence isn't finished yet — it continues into the speech tag, so it's not a full stop here.",
    question: "Questions keep their own mark, even when a tag follows.",
    exclamation: "Exclamations keep their own mark, even when a tag follows."
  },
  period: "Every full sentence ends with a full stop — even one that has a speech tag at the end."
};

const PALETTE = [
  {glyph:'“', label:'“', cls:''},
  {glyph:'”', label:'”', cls:''},
  {glyph:',', label:',', cls:''},
  {glyph:'.', label:'.', cls:''},
  {glyph:'?', label:'?', cls:''},
  {glyph:'!', label:'!', cls:''},
  {glyph:'CAP', label:'Aa', cls:'cap-btn'}
];

let state = {
  pattern: 'tagFirst',
  type: 'statement',
  speaker: SPEAKERS[0],
  line: LINES.statement[0],
  blanks: [],
  filled: [],
  activeIndex: 0,
  streak: 0,
  hintShown: false
};

function endGlyphForType(type){ return type==='statement' ? '.' : (type==='question' ? '?' : '!'); }
function innerGlyphForType(type){ return type==='statement' ? ',' : (type==='question' ? '?' : '!'); }

function buildBlanks(pattern, type){
  if(pattern==='tagFirst'){
    return [
      {kind:'comma', glyph:','},
      {kind:'open', glyph:'“'},
      {kind:'cap', glyph:'CAP'},
      {kind:'endmark', glyph: endGlyphForType(type)},
      {kind:'close', glyph:'”'}
    ];
  } else {
    return [
      {kind:'open', glyph:'“'},
      {kind:'cap', glyph:'CAP'},
      {kind:'innermark', glyph: innerGlyphForType(type)},
      {kind:'close', glyph:'”'},
      {kind:'period', glyph:'.'}
    ];
  }
}

function newSentence(keepPattern, keepType){
  const type = keepType ? state.type : state.type;
  const lines = LINES[type];
  let line = lines[Math.floor(Math.random()*lines.length)];
  let speaker = SPEAKERS[Math.floor(Math.random()*SPEAKERS.length)];
  const verbs = VERBS[type];
  let verb = verbs[Math.floor(Math.random()*verbs.length)];
  state.speaker = speaker;
  state.line = line;
  state.verb = verb;
  state.blanks = buildBlanks(state.pattern, state.type);
  state.filled = state.blanks.map(()=>false);
  state.activeIndex = 0;
  state.hintShown = false;
  render();
}

function blankHtml(idx){
  const b = state.blanks[idx];
  const filled = state.filled[idx];
  const active = idx === state.activeIndex;
  let content = '&nbsp;';
  if(filled){
    content = b.glyph === 'CAP' ? '✓' : b.glyph;
  }
  const classes = ['blank', 'kind-'+b.kind];
  if(filled) classes.push('filled');
  if(active && !filled) classes.push('active');
  return `<span class="${classes.join(' ')}" data-idx="${idx}">${content}</span>`;
}

function letterBlankHtml(idx, letter){
  const filled = state.filled[idx];
  const active = idx === state.activeIndex;
  const displayLetter = filled ? letter.toUpperCase() : letter.toLowerCase();
  const classes = ['blank', 'kind-cap', 'letter-blank'];
  if(filled) classes.push('filled');
  if(active && !filled) classes.push('active');
  return `<span class="${classes.join(' ')}" data-idx="${idx}">${displayLetter}</span>`;
}

function renderSentence(){
  const firstLetter = state.line[0];
  const restOfLine = state.line.slice(1);
  const capIdx = state.pattern==='tagFirst' ? 2 : 1;
  let html = '';

  if(state.pattern==='tagFirst'){
    html += `<span class="seg-text">${state.speaker.first} ${state.verb}</span>`;
    html += blankHtml(0);
    html += ' ';
    html += blankHtml(1);
    html += letterBlankHtml(capIdx, firstLetter);
    html += `<span class="seg-text">${restOfLine}</span>`;
    html += blankHtml(3);
    html += blankHtml(4);
  } else {
    html += blankHtml(0);
    html += letterBlankHtml(capIdx, firstLetter);
    html += `<span class="seg-text">${restOfLine}</span>`;
    html += blankHtml(2);
    html += blankHtml(3);
    html += ` <span class="seg-text">${state.speaker.last} ${state.verb}</span>`;
    html += blankHtml(4);
  }
  document.getElementById('sentenceDisplay').innerHTML = html;
}

function fullSentenceForSpeech(){
  const firstLetter = state.line[0].toUpperCase();
  const restOfLine = state.line.slice(1);
  const words = firstLetter + restOfLine;
  if(state.pattern==='tagFirst'){
    const end = endGlyphForType(state.type);
    return `${state.speaker.first} ${state.verb}, "${words}${end}"`;
  } else {
    const inner = innerGlyphForType(state.type);
    return `"${words}${inner}" ${state.speaker.last} ${state.verb}.`;
  }
}

function renderStatus(){
  const status = document.getElementById('statusRow');
  const complete = state.filled.every(f=>f);
  if(complete){
    status.textContent = '✅ Perfect! That\'s exactly how it\'s punctuated.';
  } else {
    status.textContent = '';
  }
  document.getElementById('sayBtn').disabled = !complete;
}

function renderHint(){
  const box = document.getElementById('hintBox');
  if(!state.hintShown){ box.classList.remove('show'); return; }
  const b = state.blanks[state.activeIndex];
  let text = HINTS[b.kind];
  if(typeof text === 'object') text = text[state.type];
  box.textContent = text || '';
  box.classList.add('show');
}

function render(){
  renderSentence();
  renderStatus();
  renderHint();
}

function renderPalette(){
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  PALETTE.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'palette-btn ' + p.cls;
    btn.textContent = p.label;
    btn.addEventListener('click', ()=> tryFill(p.glyph, btn));
    pal.appendChild(btn);
  });
}

function tryFill(glyph, btnEl){
  if(state.activeIndex >= state.blanks.length) return;
  const expected = state.blanks[state.activeIndex].glyph;
  if(glyph === expected){
    state.filled[state.activeIndex] = true;
    state.activeIndex++;
    state.hintShown = false;
    render();
    if(state.filled.every(f=>f)){
      state.streak++;
      document.getElementById('streakCount').textContent = state.streak;
    }
  } else {
    btnEl.classList.remove('shake');
    void btnEl.offsetWidth;
    btnEl.classList.add('shake');
  }
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[""]/g,'"');
  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate = 0.85;
  window.speechSynthesis.speak(utter);
}

document.getElementById('sayBtn').addEventListener('click', ()=>{
  speak(fullSentenceForSpeech());
});

document.getElementById('nextBtn').addEventListener('click', ()=> newSentence(true, true));

document.getElementById('hintBtn').addEventListener('click', ()=>{
  state.hintShown = !state.hintShown;
  renderHint();
});

document.querySelectorAll('[data-pattern]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('[data-pattern]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.pattern = btn.dataset.pattern;
    newSentence(false, true);
  });
});

document.querySelectorAll('[data-type]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.type = btn.dataset.type;
    newSentence(true, false);
  });
});

renderPalette();
newSentence(true, true);
</script>
</body>
</html>
